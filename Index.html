<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRSC Tide & Pressure Dashboard</title>
    <!-- Load Chart.js and the dependencies for time scaling -->
    <script src="https://jsdelivr.net"></script>
    <script src="https://jsdelivr.net"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column; /* Stack layout vertically */
            justify-content: center;
            align-items: center;
            background-color: #f8f9fa;
            font-family: sans-serif;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* Status header displaying the latest reading matching the blue line */
        .status-header {
            font-size: 1.25rem;
            font-weight: bold;
            color: #007bff; /* Color matched to Tide Height Line */
            margin-bottom: 10px;
            text-align: center;
            padding: 0 15px;
            width: 100%;
            box-sizing: border-box;
        }

        @media (max-width: 480px) {
            .status-header {
                font-size: 1rem; /* Marginally downscale text on small mobile screens */
            }
        }

        /* Fully responsive container that adapts instantly on device rotation */
        .chart-container {
            position: relative;
            width: 95vw;
            height: 78vh; /* Adjusted slightly to make room for the header */
            max-width: 1200px;
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            box-sizing: border-box;
        }

        canvas {
            width: 100% !important;
            height: 100% !important;
        }
    </style>
</head>
<body>

    <!-- Dynamic Header Area -->
    <div class="status-header" id="latest-reading">MRSC Tide Height: Loading...</div>

    <div class="chart-container">
        <canvas id="multiFieldChart"></canvas>
    </div>

    <script>
        // --- CONFIGURATION ---
        const CHANNEL_ID = ' 3239925'; 
        const READ_API_KEY = '2380EH2E5H0RPTXU'; // Leave empty string '' if your channel is public
        
        let tsChart;

        // Update the header text with the absolute newest data point
        function updateHeader(latestFeed) {
            const headerDiv = document.getElementById('latest-reading');
            if (!latestFeed) {
                headerDiv.innerText = "MRSC Tide Height: No data available";
                return;
            }

            const val1 = parseFloat(latestFeed.field1).toFixed(2);
            const timeObj = new Date(latestFeed.created_at);
            const timeString = timeObj.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            headerDiv.innerText = `MRSC Tide Height: ${val1}m at ${timeString}`;
        }

        // Fetch exactly 6 hours of data from ThingSpeak
        async function fetchThingSpeakData() {
            let url = `https://thingspeak.com{CHANNEL_ID}/feeds.json?minutes=360`;
            if(READ_API_KEY) { url += `&api_key=${READ_API_KEY}`; }

            try {
                const response = await fetch(url);
                const data = await response.json();
                
                // Map the feeds into data points containing the absolute timestamp and value
                const tideData = data.feeds.map(feed => ({
                    x: new Date(feed.created_at),
                    y: parseFloat(feed.field1)
                }));

                const pressureData = data.feeds.map(feed => ({
                    x: new Date(feed.created_at),
                    y: parseFloat(feed.field2)
                }));

                // Update the text banner using the last item in the feed array
                if (data.feeds && data.feeds.length > 0) {
                    updateHeader(data.feeds[data.feeds.length - 1]);
                }

                updateChart(tideData, pressureData);
            } catch (error) {
                console.error("Error fetching data from ThingSpeak:", error);
            }
        }

        // Initialize or dynamically update the chart
        function updateChart(tideData, pressureData) {
            // Lock the visible timeline boundaries to exactly a 6-hour moving window
            const now = new Date();
            const sixHoursAgo = new Date(now.getTime() - (6 * 60 * 60 * 1000));

            if (tsChart) {
                // Shift windows and update arrays seamlessly without clear flashes
                tsChart.options.scales.x.min = sixHoursAgo;
                tsChart.options.scales.x.max = now;
                tsChart.data.datasets.data = tideData;
                tsChart.data.datasets.data = pressureData;
                tsChart.update();
                return;
            }

            // Define canvas layout parameters on initial site load
            const ctx = document.getElementById('multiFieldChart').getContext('2d');
            tsChart = new Chart(ctx, {
                type: 'line',
                data: {
                    datasets: [
                        {
                            label: 'Tide Height (m)',
                            data: tideData,
                            borderColor: '#007bff',
                            backgroundColor: 'rgba(0, 123, 255, 0.1)',
                            yAxisID: 'yTide',
                            tension: 0.3,
                            pointRadius: 2
                        },
                        {
                            label: 'Atmospheric Pressure (hPa)',
                            data: pressureData,
                            borderColor: '#dc3545',
                            backgroundColor: 'rgba(220, 53, 69, 0.1)',
                            yAxisID: 'yPressure',
                            tension: 0.3,
                            pointRadius: 2
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false, // Vital for instant adjustment between portrait/landscape
                    scales: {
                        x: {
                            type: 'time',
                            min: sixHoursAgo, // Crops data older than 6 hours out on the left edge
                            max: now,        // Anchors the right edge of the chart to the current moment
                            time: {
                                unit: 'hour',
                                stepSize: 1, // Ensures vertical gridlines are generated on the hour mark
                                displayFormats: {
                                    hour: 'HH:mm'
                                }
                            },
                            ticks: {
                                maxRotation: 0,
                                autoSkip: true
                            },
                            title: {
                                display: true,
                                text: 'Time (Exact 6-Hour Window)'
                            }
                        },
                        yTide: {
                            type: 'linear',
                            position: 'left',
                            min: 3,         
                            max: 5.5,       
                            title: { 
                                display: true, 
                                text: 'Tide Height (m)',
                                color: '#007bff', // Matches the Blue plot line
                                font: {
                                    weight: 'bold'
                                }
                            },
                            ticks: {
                                stepSize: 0.25,
                                color: '#007bff' // Matches label numbers to the plot color
                            }
                        },
                        yPressure: {
                            type: 'linear',
                            position: 'right',
                            min: 950,       
                            max: 1050,      
                            title: { 
                                display: true, 
                                text: 'Pressure (hPa)',
                                color: '#dc3545', // Matches the Red plot line
                                font: {
                                    weight: 'bold'
                                }
                            },
                            ticks: {
                                stepSize: 10,
                                color: '#dc3545' // Matches label numbers to the plot color
                            },
                            grid: { 
                                drawOnChartArea: false 
                            }
                        }
                    }
                }
            });
        }

        // Run data pipeline immediately on load
        fetchThingSpeakData();

        // Query API strictly every 30 seconds
        setInterval(fetchThingSpeakData, 30000);

        // Instantly resize layout if the user flips their smartphone or tablet orientation
        window.addEventListener('resize', () => {
            if(tsChart) { tsChart.resize(); }
        });
    </script>
</body>
</html>
