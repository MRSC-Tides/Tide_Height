<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRSC Tide & Pressure Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #f8f9fa;
            font-family: sans-serif;
            overflow: hidden;
            box-sizing: border-box;
        }

        .status-header {
            font-size: 1.5rem;
            font-family: "Arial Black", "Impact", sans-serif; 
            font-weight: 900;
            color: #000000;
            margin-bottom: 10px;
            text-align: center;
            padding: 0 15px;
            width: 100%;
            box-sizing: border-box;
        }

        @media (max-width: 480px) {
            .status-header {
                font-size: 1rem;
            }
        }

        .chart-container {
            position: relative;
            width: 95vw;
            height: 78vh;
            max-width: 1200px;
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            box-sizing: border-box;
        }

        canvas {
            width: 100% !important;
            height: 100% !important;
        }
    </style>
</head>
<body>

    <div class="status-header" id="latest-reading">MRSC Tide Height: Loading...</div>

    <div class="chart-container">
        <canvas id="multiFieldChart"></canvas>
    </div>

    <script>
        // --- CONFIGURATION ---
        const CHANNEL_ID = '3239925'; 
        const READ_API_KEY = '2380EH2E5H0RPTXU'; 
        
        let tsChart;

        function updateHeader(latestFeed) {
            const headerDiv = document.getElementById('latest-reading');
            if (!latestFeed) {
                headerDiv.innerText = "MRSC Tide Height: No data available";
                return;
            }

            const val1 = parseFloat(latestFeed.field1).toFixed(2);
            const timeObj = new Date(latestFeed.created_at);
            const timeString = timeObj.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            headerDiv.innerText = `MRSC Tide Height: ${val1}m at ${timeString}`;
        }

        async function fetchThingSpeakData() {
            // EXACT URL STRING FORMAT
            let url = `https://api.thingspeak.com/channels/${CHANNEL_ID}/feeds.json?minutes=720`;
            if(READ_API_KEY) { url += `&api_key=${READ_API_KEY}`; }

            try {
                const response = await fetch(url);
                const data = await response.json();
                
                if (!data.feeds || data.feeds.length === 0) {
                    console.warn("No feeds returned from ThingSpeak API.");
                    return;
                }

                const tideData = data.feeds.map(feed => ({
                    x: new Date(feed.created_at),
                    y: parseFloat(feed.field1)
                }));

                const pressureData = data.feeds.map(feed => ({
                    x: new Date(feed.created_at),
                    y: parseFloat(feed.field2)
                }));

                updateHeader(data.feeds[data.feeds.length - 1]);
                updateChart(tideData, pressureData);
            } catch (error) {
                console.error("Error fetching data from ThingSpeak:", error);
            }
        }

        function updateChart(tideData, pressureData) {
            const now = new Date();
            const twelveHoursAgo = new Date(now.getTime() - (12 * 60 * 60 * 1000));

            if (tsChart) {
                // EXPLICIT INDEX ARRAYS TO PREVENT INTERNALS CRASHING
                tsChart.options.scales.x.min = twelveHoursAgo;
                tsChart.options.scales.x.max = now;
                tsChart.data.datasets[0].data = tideData;
                tsChart.data.datasets[1].data = pressureData;
                tsChart.update();
                return;
            }

            const ctx = document.getElementById('multiFieldChart').getContext('2d');
            tsChart = new Chart(ctx, {
                type: 'line',
                data: {
                    datasets: [
                        {
                            label: 'Tide Height (m)',
                            data: tideData,
                            borderColor: '#007bff',
                            backgroundColor: 'rgba(0, 123, 255, 0.1)',
                            yAxisID: 'yTide',
                            tension: 0.3,
                            pointRadius: 0
                        },
                        {
                            label: 'Atmospheric Pressure (hPa)',
                            data: pressureData,
                            borderColor: '#dc3545',
                            backgroundColor: 'rgba(220, 53, 69, 0.1)',
                            yAxisID: 'yPressure',
                            tension: 0.3,
                            pointRadius: 0
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false // This completely hides the two top legend boxes
                        }
                    },
                    scales: {
                        x: {
                            type: 'time',
                            min: twelveHoursAgo,
                            max: now,
                            time: {
                                unit: 'hour',
                                stepSize: 1,
                                displayFormats: {
                                    hour: 'HH:mm'
                                }
                            },
                            ticks: {
                                minRotation: 45,
                                maxRotation: 45,
                                autoSkip: true,
                                font: {
                                    size: 16,
                                    weight: 'bold'
                                }
                            },
                            title: {
                                display: true,
                                text: 'Time',
                                size: 16,
                                weight: 'bold'
                            },
                            grid: {
                                lineWidh: 2,
                                color: 'rgba(0,0,0,0.15)'
                            }
                        },
                        yTide: {
                            type: 'linear',
                            position: 'left',
                            min: 3,         
                            max: 5.5,       
                            title: { 
                                display: true, 
                                text: 'Tide Height (m)',
                                color: '#007bff',
                                font: { weight: 'bold',
                                      size: 16
                                },
                                grid: {
                                    lineWidh: 2,
                                    color: 'rgba(0,0,0,0.15)'
                                }                                
                            },
                            ticks: {
                                stepSize: 0.25,
                                color: '#007bff',
                                font: {
                                    size: 16,
                                    weight: 'bold'
                                }
                            }
                        },
                        yPressure: {
                            type: 'linear',
                            position: 'right',
                            min: 950,       
                            max: 1050,      
                            title: { 
                                display: true, 
                                text: 'Pressure (hPa)',
                                color: '#dc3545',
                                font: { weight: 'bold',
                                      size: 16
                                }
                            },
                            ticks: {
                                stepSize: 10,
                                color: '#dc3545',
                                font: {
                                    size: 16,
                                    weight: 'bold'
                                }
                            },
                            grid: { drawOnChartArea: false }
                        }
                    }
                }
            });
        }

        fetchThingSpeakData();
        setInterval(fetchThingSpeakData, 30000);

        window.addEventListener('resize', () => {
            if(tsChart) { tsChart.resize(); }
        });
    </script>
</body>
</html>
