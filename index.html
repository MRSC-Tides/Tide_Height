<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRSC Tide & Pressure Dashboard</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #f8f9fa;
            font-family: sans-serif;
            overflow: hidden;
            box-sizing: -box;
        }

        .status-header {
            font-size: 1.5rem;
            font-family: "Arial Black", "Impact", sans-serif; 
            font-weight: 900;
            color: #000000;
            margin-bottom: 10px;
            text-align: center;
            padding: 0 15px;
            width: 100%;
            box-sizing: -box;
        }

        @media (max-width: 480px) {
            .status-header {
                font-size: 1rem;
            }
        }

        /* Adjusted height to fill the screen completely now that the header space is removed */
        .chart-container {
            position: relative;
            width: 95vw;
            height: 85vh; /* Bumped up from 78vh to give you a significantly larger graph area */
            max-width: 1200px;
            background: white;
            padding: 15px;
            -radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            box-sizing: -box;
        }

        .status-header {
            position: absolute;
            top: 10px;    /* Anchors it cleanly at the top edge of the white box */
            left: 50%;    /* Centers it horizontally */
            transform: translateX(-50%);
            font-size: 1.4rem;
            font-family: "Arial Black", "Impact", sans-serif;
            font-weight: 900;
            text-transform: none;
            color: #000000;
            text-align: center;
            width: 90%;
            box-sizing: -box;
            z-index: 10;  /* Keeps text layered safely on top of background grids */
        }
        .date-footer {
            position: absolute;
            bottom: 5px;   /* Anchors it just above the bottom edge */
            right: 15px;   /* Aligns it perfectly with the right scale numbers */
            font-size: 0.9rem;
            color: #333333;
            font-family: sans-serif;
            font-weight: bold; /* Bold styling */
            z-index: 10;   /* Ensures the text stays cleanly visible on top of background lines */
        }

        canvas {
            width: 100% !important;
            height: 100% !important;
        }
    </style>
</head>
<body>

    <div class="chart-container">
        <!-- The main title is now nested inside the chart box at the very top -->
        <div class="status-header" id="latest-reading">MRSC Tide Height: Loading...</div>
        <canvas id="multiFieldChart"></canvas>
        <div class="date-footer" id="current-date-display"></div>
    </div>
    
    <script>
        // --- CONFIGURATION ---
        const CHANNEL_ID = '3239925'; 
        const READ_API_KEY = '2380EH2E5H0RPTXU'; 
        
        let tsChart;

        function updateHeader(latestFeed) {
            const headerDiv = document.getElementById('latest-reading');
            const dateDiv = document.getElementById('current-date-display');
            if (!latestFeed) {
                headerDiv.innerText = "MRSC Tide Height: No data available";
                return;
            }

            const val1 = parseFloat(latestFeed.field1).toFixed(2);
            const timeObj = new Date(latestFeed.created_at);
            const timeString = timeObj.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            headerDiv.innerText = `MRSC Tide Height: ${val1}m at ${timeString}`;

            // DYNAMIC 3-PART BLOCK DATE INJECTOR (Month, Day, Year format)
            const options = { month: 'short', day: '2-digit', year: 'numeric' };
            dateDiv.innerText = timeObj.toLocaleDateString('en-US', options);

        }

        async function fetchThingSpeakData() {
            // EXACT URL STRING FORMAT
            let url = `https://api.thingspeak.com/channels/${CHANNEL_ID}/feeds.json?minutes=720&nocache=${Date.now()}`;
            if(READ_API_KEY) { url += `&api_key=${READ_API_KEY}`; }

            try {
                const response = await fetch(url);
                const data = await response.json();
                
                if (!data.feeds || data.feeds.length === 0) {
                    console.warn("No feeds returned from ThingSpeak API.");
                    return;
                }

                const tideData = data.feeds.map(feed => ({
                    x: new Date(feed.created_at),
                    y: parseFloat(feed.field1)
                }));

                const pressureData = data.feeds.map(feed => ({
                    x: new Date(feed.created_at),
                    y: parseFloat(feed.field2)
                }));

                updateHeader(data.feeds[data.feeds.length - 1]);
                updateChart(tideData, pressureData);
            } catch (error) {
                console.error("Error fetching data from ThingSpeak:", error);
            }
        }

        function updateChart(tideData, pressureData) {
            const now = new Date();
            const twelveHoursAgo = new Date(now.getTime() - (12 * 60 * 60 * 1000));

            if (tsChart) {
                // EXPLICIT INDEX ARRAYS TO PREVENT INTERNALS CRASHING
                tsChart.options.scales.x.min = twelveHoursAgo;
                tsChart.options.scales.x.max = now;
                tsChart.data.datasets[0].data = tideData;
                tsChart.data.datasets[1].data = pressureData;
                tsChart.update();
                return;
            }

            const ctx = document.getElementById('multiFieldChart').getContext('2d');
            tsChart = new Chart(ctx, {
                type: 'line',
                data: {
                    datasets: [
                        {
                            label: 'Tide Height (m)',
                            data: tideData,
                            borderColor: '#007bff',
                            backgroundColor: 'rgba(0, 123, 255, 0.1)',
                            yAxisID: 'yTide',
                            tension: 0.3,
                            pointRadius: 0
                        },
                        {
                            label: 'Atmospheric Pressure (hPa)',
                            data: pressureData,
                            borderColor: '#dc3545',
                            backgroundColor: 'rgba(220, 53, 69, 0.1)',
                            yAxisID: 'yPressure',
                            tension: 0.3,
                            pointRadius: 0
                        }
                    ]
                },
                plugins: [{
                    id: 'topBorderFix',
                    afterDatasetsDraw(chart) {
                        const { ctx, chartArea: { left, top, right } } = chart;
                        ctx.save();
                        ctx.strokeStyle = '#000000'; // Match the thick black line
                        ctx.lineWidth = 2;           // Match the 2px thickness
                        ctx.beginPath();
                        ctx.moveTo(left, top);
                        ctx.lineTo(right, top);
                        ctx.stroke();
                        ctx.restore();
                    }
                }],
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    layout: {
                        padding: {
                            top: 40,   // Pushes the graphic grid down to leave clean breathing room for your main title
                            bottom: 10 // Keeps padding room for your bottom-right date stamp
                        }
                    },
                    plugins: {
                        legend: {
                            display: false // Setting this to true makes the Tide and Pressure boxes visible again
                        }
                    },
                    scales: {
                        x: {
                            type: 'time',
                            min: twelveHoursAgo,
                            max: now,
                            border: {
                                color: '#000000', // Thick outer bottom line
                                width: 2
                            },
                            time: {
                                unit: 'hour',
                                stepSize: 1,
                                displayFormats: {
                                    hour: 'HH:mm'
                                }
                            },
                            ticks: {
                                minRotation: 45,
                                maxRotation: 45,
                                autoSkip: true,
                                font: {
                                    size: 16,
                                    weight: 'bold'
                                }
                            },
                            title: {
                                display: false,
                                text: 'Time',
                                size: 16,
                                weight: 'bold'
                            },
                            grid: {
                                lineWidth: 2,
                                color: 'rgba(0,0,0,0.15)'
                            }
                        },
                        yTide: {
                            type: 'linear',
                            position: 'left',
                            min: 3,         
                            max: 5.5,
                            border: {
                                color: '#000000', // Thick outer left line
                                width: 2
                            },
                            title: { 
                                display: true, 
                                text: 'Tide Height (m)',
                                color: '#007bff',
                                font: { weight: 'bold',
                                      size: 16
                                },
                                grid: {
                                    lineWidth: 2,
                                    color: 'rgba(0,0,0,0.15)'
                                }                                
                            },
                            ticks: {
                                stepSize: 0.25,
                                color: '#007bff',
                                font: {
                                    size: 16,
                                    weight: 'bold'
                                }
                            }
                        },
                        yPressure: {
                            type: 'linear',
                            position: 'right',
                            min: 950,       
                            max: 1050,
                            border: {
                                color: '#000000', // Thick outer right line
                                width: 2
                            },
                            title: { 
                                display: true, 
                                text: 'Pressure (hPa)',
                                color: '#dc3545',
                                font: { weight: 'bold',
                                      size: 16
                                }
                            },
                            ticks: {
                                stepSize: 10,
                                color: '#dc3545',
                                font: {
                                    size: 16,
                                    weight: 'bold'
                                }
                            },
                            grid: { drawOnChartArea: false }
                        }
                    }
                    
                }
            });
        }

        fetchThingSpeakData();
        setInterval(fetchThingSpeakData, 30000);

        // Clear layout and run a fresh cache-free API request instantly when orientation changes
        window.addEventListener('resize', () => {
            if (tsChart) { 
                tsChart.resize(); 
                fetchThingSpeakData(); // Instantly fetches fresh non-cached data on rotation
            }
        });
    </script>
</body>
</html>
